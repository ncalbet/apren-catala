<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Feature graphic — 1024×500</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
<style>
  body{margin:0;padding:28px;background:#f3f4f6;font-family:system-ui,sans-serif;color:#111827}
  .wrap{max-width:1080px;margin:0 auto}
  h1{font-size:22px;margin:0 0 4px}
  p{color:#6b7280;margin:0 0 18px}
  canvas{width:100%;max-width:1024px;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.15)}
  button{margin-top:16px;background:#1a2f4e;color:#fff;border:0;border-radius:10px;
         padding:13px 22px;font-size:15px;font-weight:600;cursor:pointer}
  button:hover{background:#24406b}
</style>
</head>
<body>
<div class="wrap">
<h1>Feature graphic — Google Play (1024×500)</h1>
<p>Cal obrir-ho via servidor local (no file://) perquè el canvas pugui llegir la icona. El botó baixa el PNG a mida exacta.</p>
<canvas id="c" width="1024" height="500"></canvas><br>
<button id="dl">Baixar feature-graphic.png</button>
<script>
const g = document.getElementById('c').getContext('2d');

function pill(x, y, text, color) {
  g.font = '700 16px "DM Sans", sans-serif';
  const w = g.measureText(text).width + 34;
  g.fillStyle = 'rgba(255,255,255,0.07)';
  g.strokeStyle = 'rgba(255,255,255,0.18)';
  g.lineWidth = 1;
  g.beginPath(); g.roundRect(x, y, w, 38, 19); g.fill(); g.stroke();
  g.fillStyle = color;
  g.fillText(text, x + 17, y + 25);
  return w;
}

async function draw() {
  await document.fonts.ready;
  const icon = new Image();
  icon.src = 'icons/icon-512x512.png';
  await new Promise((res, rej) => { icon.onload = res; icon.onerror = rej; });

  // fons
  const bg = g.createLinearGradient(0, 0, 1024, 500);
  bg.addColorStop(0, '#0f1e35'); bg.addColorStop(0.6, '#1a2f4e'); bg.addColorStop(1, '#1e3a5f');
  g.fillStyle = bg; g.fillRect(0, 0, 1024, 500);

  // cercles decoratius sota la icona
  g.globalAlpha = 0.4; g.fillStyle = '#2d4a7a';
  g.beginPath(); g.arc(830, 250, 210, 0, 7); g.fill();
  g.globalAlpha = 0.3; g.fillStyle = '#3a5f9a';
  g.beginPath(); g.arc(830, 250, 150, 0, 7); g.fill();
  g.globalAlpha = 0.5; g.fillStyle = '#16283f';
  g.beginPath(); g.arc(120, 460, 150, 0, 7); g.fill();
  g.globalAlpha = 1;

  // barra daurada
  const gold = g.createLinearGradient(64, 0, 150, 0);
  gold.addColorStop(0, '#f59e0b'); gold.addColorStop(1, '#fbbf24');
  g.fillStyle = gold;
  g.beginPath(); g.roundRect(64, 74, 84, 5, 2.5); g.fill();

  // títol: AprènCatalà en una línia, sans (adéu serif)
  g.font = '800 78px "DM Sans", sans-serif';
  g.fillStyle = '#ffffff';
  g.fillText('Aprèn', 62, 170);
  const wA = g.measureText('Aprèn').width;
  g.fillStyle = '#f59e0b';
  g.fillText('Català', 62 + wA, 170);

  // subtítol
  g.font = '400 25px "DM Sans", sans-serif';
  g.fillStyle = '#b8c4d4';
  g.fillText('Aprèn i perfecciona el català · nivells A2 – C1', 64, 222);
  g.fillText('i les novetats normatives de l’IEC', 64, 256);

  // xips (dades REALS: 336, SRS, repte diari, sense anuncis)
  let x = 64;
  x += pill(x, 296, '336 exercicis', '#fbbf24') + 12;
  x += pill(x, 296, 'Repàs intel·ligent', '#93c5fd') + 12;
  pill(x, 296, 'Repte diari', '#6ee7b7');
  x = 64;
  x += pill(x, 346, 'Gratuït', '#fdba74') + 12;
  pill(x, 346, 'Sense anuncis', '#fdba74');

  // lema
  g.font = 'italic 400 21px "DM Sans", sans-serif';
  g.fillStyle = 'rgba(255,255,255,0.65)';
  g.fillText('Aprèn. Practica. Domina.', 64, 448);

  // la icona nova, gran, a la dreta, amb una lluïssor càlida subtil
  g.save();
  g.shadowColor = 'rgba(245,158,11,0.28)';
  g.shadowBlur = 46;
  g.drawImage(icon, 668, 88, 324, 324);
  g.restore();
}
draw();

document.getElementById('dl').onclick = () =>
  document.getElementById('c').toBlob(b => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = 'feature-graphic.png';
    a.click();
    URL.revokeObjectURL(a.href);
  }, 'image/png');
</script>
</div>
</body>
</html>
