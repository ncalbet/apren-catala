name: Recordatoris diaris

# Cron horari (7–21 UTC) amb minut esbiaixat: el minut 0 és l'hora punta de
# GitHub Actions i els crons hi arrenquen amb 1–2,5 h de retard o es descarten.
# El script envia amb recuperació (>= hora de l'usuari), així una execució
# perduda es recupera a la següent en lloc de perdre's el toc del dia.
on:
  schedule:
    - cron: '17 7-21 * * *'
  workflow_dispatch:

# Serialitza execucions: si un cron i un dispatch manual coincideixen, la segona
# espera la primera (no es cancel·la) → evita enviaments dobles per concurrència.
concurrency:
  group: recordatoris-diaris
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Instal·la dependències
        run: npm ci
        working-directory: scripts
      - name: Envia notificacions
        run: node send_notificacions.cjs
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
