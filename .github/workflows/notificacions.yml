name: Recordatoris diaris

# Cron dens (cada 20 min, 7–21 UTC, minuts fora de l'hora punta): GitHub
# descarta la majoria d'execucions programades per prioritat baixa (el 6 jul
# només van córrer 5 de 15 crons horaris, amb forats de ~3 h). Amb 45
# oportunitats/dia el decalatge típic queda en ~20-60 min. El script envia amb
# recuperació (>= hora de l'usuari) i guarda diària, així no hi ha duplicats.
on:
  schedule:
    - cron: '17,37,57 7-21 * * *'
  workflow_dispatch:

# Serialitza execucions: si un cron i un dispatch manual coincideixen, la segona
# espera la primera (no es cancel·la) → evita enviaments dobles per concurrència.
concurrency:
  group: recordatoris-diaris
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Instal·la dependències
        run: npm ci
        working-directory: scripts
      - name: Envia notificacions
        run: node send_notificacions.cjs
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
