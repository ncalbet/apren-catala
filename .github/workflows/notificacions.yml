name: Recordatoris diaris

on:
  schedule:
    - cron: '0 7,8,11,12,17,18,19,20 * * *'
  workflow_dispatch:

# Serialitza execucions: si un cron i un dispatch manual coincideixen, la segona
# espera la primera (no es cancel·la) → evita enviaments dobles per concurrència.
concurrency:
  group: recordatoris-diaris
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Instal·la dependències
        run: npm ci
        working-directory: scripts
      - name: Envia notificacions
        run: node send_notificacions.cjs
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
